name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx ng build --base-href /Angular-Test/

      # GitHub Pages has no server-side rewrites: serve index.html for any
      # unknown path (e.g. /admin/<token>) so client-side routing works.
      - run: cp dist/Angular-Test/browser/index.html dist/Angular-Test/browser/404.html

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/Angular-Test/browser
