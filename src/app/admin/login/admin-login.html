<div class="admin-root admin-auth-screen">
  <div class="admin-auth-card admin-card">
    <h1>Connexion</h1>
    <p>Entrez le mot de passe administrateur pour accéder au backoffice.</p>
    <form (ngSubmit)="submit()">
      <label class="field">
        Mot de passe
        <input type="password" name="password" required [ngModel]="password()" (ngModelChange)="password.set($event)" />
      </label>
      @if (error()) {
        <p class="admin-auth-error">{{ error() }}</p>
      }
      <button class="admin-btn admin-btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Connexion…' : 'Se connecter' }}
      </button>
    </form>
  </div>
</div>
